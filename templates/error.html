{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<section class="card">
  <h1>Something Went Wrong</h1>
  <p>{{ message }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</section>
{% endblock %}
{% block scripts %}
<script>
window.addEventListener('DOMContentLoaded', function () {
  VoiceMail.speak("{{ message }}");
});
</script>
{% endblock %}
